services:
  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    command: sh -c "bun install && bun run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./front:/app
      - front_node_modules:/app/node_modules
    depends_on:
      - back

  back:
    build:
      context: ./back
      dockerfile: Dockerfile
    command: sh -c "bun install && bun run start:dev"
    ports:
      - "3001:3001"
    volumes:
      - ./back:/app
      - back_node_modules:/app/node_modules
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/template
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: template
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  front_node_modules:
  back_node_modules:
